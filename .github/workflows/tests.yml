name: Tests

on:
  push:
    branches-ignore:
      - master
  pull_request:
    branches:
      - master

jobs:
  kasse-app:
    name: kasse-app Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        working-directory: kasse-app
        run: pip install flask pytest pytest-cov

      - name: Tests ausführen mit Coverage
        working-directory: kasse-app
        run: pytest tests/ -v --tb=short --cov=kasse_logik --cov-report=term-missing

  wawi-app:
    name: wawi-app Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install flask pytest pytest-cov

      - name: Tests ausführen mit Coverage
        working-directory: wawi-app
        run: pytest tests/ -v --tb=short --cov=models --cov-report=term-missing
