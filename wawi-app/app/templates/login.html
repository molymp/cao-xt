<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmeldung – WaWi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@400;600;700;800&display=swap"
      media="print" onload="this.media='all'">
<noscript><link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@400;600;700;800&display=swap"></noscript>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
  background: #1a4010;
}
.login-wrap {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 28px; padding: 24px;
}
.login-logo {
  font-family: 'Lobster', Georgia, serif;
  font-size: 48px; font-weight: 400;
  color: #d4e8c2; text-align: center; line-height: 1.1;
}
.login-logo span {
  display: block; font-family: 'Nunito', sans-serif;
  font-size: 16px; color: #a8b890; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px;
}
.login-card {
  background: white; border-radius: 16px;
  padding: 32px; width: min(440px, 100%);
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}
.login-card h2 {
  font-family: 'Lobster', Georgia, serif;
  font-size: 22px; font-weight: 400; color: #1a4010;
  margin-bottom: 20px; text-align: center;
}
.login-tabs {
  display: flex; gap: 0; margin-bottom: 24px;
  border-radius: 10px; overflow: hidden; border: 2px solid #2e6e1a;
}
.login-tab {
  flex: 1; padding: 14px 8px; border: none;
  font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: background 0.15s, color 0.15s;
  background: white; color: #2e6e1a;
}
.login-tab.active { background: #2e6e1a; color: white; }
.login-tab:not(.active):hover { background: #e8f0e0; }
.login-mode { display: none; }
.login-mode.active { display: block; }
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; margin-bottom: 6px;
  color: #5a7a3a; font-size: 12px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
}
.form-control {
  width: 100%; padding: 14px 16px;
  background: #f0ece0; border: 1px solid #ece3cc;
  border-radius: 10px; color: #142808; font-size: 16px;
  font-family: 'Nunito', sans-serif;
}
.form-control:focus { outline: none; border-color: #2e6e1a; }
.btn-login {
  width: 100%; padding: 16px;
  background: #c8780a; border: none; border-radius: 10px;
  color: white; font-size: 16px; font-weight: 700;
  font-family: 'Nunito', sans-serif;
  cursor: pointer; margin-top: 6px;
  transition: background 0.12s;
}
.btn-login:hover  { background: #e8970e; }
.btn-login:active { opacity: 0.85; transform: scale(0.98); }
.alert-error {
  background: #fde8e8; border: 1px solid #b83030;
  color: #b83030; padding: 12px 16px; border-radius: 8px;
  margin-bottom: 18px; font-size: 14px; text-align: center; font-weight: 700;
}
.scan-area {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 16px; gap: 16px;
  border: 3px dashed #a8b890; border-radius: 14px;
  background: #f6faf2; min-height: 180px;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
}
.scan-area.focus { border-color: #2e6e1a; background: #edf5e6; }
.scan-icon { font-size: 48px; line-height: 1; }
.scan-hint { font-size: 18px; color: #5a7a3a; font-weight: 600; text-align: center; }
.scan-hint-sub { font-size: 13px; color: #8a9a7a; font-weight: 400; }
#scan-input { position: absolute; left: -9999px; opacity: 0; width: 1px; height: 1px; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    🌾 WaWi
    <span>Habacher Dorfladen</span>
  </div>
  <div class="login-card">
    <h2>Anmeldung</h2>
    {% if fehler %}
    <div class="alert-error">{{ fehler }}</div>
    {% endif %}
    <div class="login-tabs">
      <button class="login-tab active" type="button" data-mode="karte">Karte scannen</button>
      <button class="login-tab" type="button" data-mode="passwort">Passwort</button>
    </div>
    <div class="login-mode active" id="mode-karte">
      <form method="POST" action="/login/karte" id="scan-form">
        <input type="hidden" name="guid" id="scan-guid">
        <div class="scan-area" id="scan-area">
          <div class="scan-icon">&#x1F4F3;</div>
          <div class="scan-hint">Mitarbeiterkarte scannen</div>
          <div class="scan-hint-sub">Barcode an den Scanner halten</div>
        </div>
        <input type="text" id="scan-input" autocomplete="off" autocorrect="off"
               autocapitalize="off" spellcheck="false" inputmode="none">
      </form>
    </div>
    <div class="login-mode" id="mode-passwort">
      <form method="POST" action="/login">
        <div class="form-group">
          <label>Benutzername</label>
          <input class="form-control" type="text" name="login_name"
                 autocomplete="username" autocorrect="off" autocapitalize="off"
                 spellcheck="false" id="pw-login-name">
        </div>
        <div class="form-group">
          <label>Passwort</label>
          <input class="form-control" type="password" name="passwort"
                 autocomplete="current-password">
        </div>
        <button class="btn-login" type="submit">Anmelden</button>
      </form>
    </div>
  </div>
</div>
<script>
(function() {
  var tabs = document.querySelectorAll('.login-tab');
  var modes = document.querySelectorAll('.login-mode');
  var scanInput = document.getElementById('scan-input');
  var scanArea = document.getElementById('scan-area');
  var scanGuid = document.getElementById('scan-guid');
  var scanForm = document.getElementById('scan-form');
  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      var mode = tab.getAttribute('data-mode');
      tabs.forEach(function(t) { t.classList.remove('active'); });
      modes.forEach(function(m) { m.classList.remove('active'); });
      tab.classList.add('active');
      document.getElementById('mode-' + mode).classList.add('active');
      if (mode === 'karte') { scanInput.focus(); }
      else { document.getElementById('pw-login-name').focus(); }
    });
  });
  function focusScanInput() {
    if (document.getElementById('mode-karte').classList.contains('active')) scanInput.focus();
  }
  scanArea.addEventListener('click', focusScanInput);
  scanInput.addEventListener('focus', function() { scanArea.classList.add('focus'); });
  scanInput.addEventListener('blur', function() {
    scanArea.classList.remove('focus');
    setTimeout(focusScanInput, 200);
  });
  scanInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      var guid = scanInput.value.trim();
      if (guid.length > 0) { scanGuid.value = guid; scanForm.submit(); }
      scanInput.value = '';
    }
  });
  focusScanInput();
  document.addEventListener('keydown', function(e) {
    if (!document.getElementById('mode-karte').classList.contains('active')) return;
    if (document.activeElement === scanInput) return;
    if (e.key.length === 1 || e.key === 'Enter') scanInput.focus();
  });
})();
</script>
</body>
</html>
