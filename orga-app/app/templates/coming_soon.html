{% extends "base.html" %}
{% block title %}{{ modul }} – Demnächst{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;">
  <div style="font-size:64px;margin-bottom:16px;">🚧</div>
  <h1 style="font-size:32px;margin-bottom:12px;">{{ modul }}</h1>
  <p style="color:var(--text-hell);font-size:16px;max-width:400px;line-height:1.6;">
    Dieses Modul befindet sich in Entwicklung und wird in einer zukünftigen Version verfügbar sein.
  </p>
  <a href="/" style="
    display:inline-flex;align-items:center;gap:8px;
    margin-top:28px;
    background:var(--gruen-dunkel);color:var(--gruen-blass);
    padding:12px 24px;border-radius:var(--radius-klein);
    font-weight:700;font-size:15px;font-family:'Nunito',sans-serif;
    transition:background .15s;">
    ← Zurück zum Dashboard
  </a>
</div>
{% endblock %}
