{% extends "kunden_base.html" %}
{% block title %}Stempeluhr – Abwesenheit{% endblock %}

{% block extra_css %}
<style>
.ss-wrap { max-width: 700px; margin: 0 auto; padding: 16px 20px 40px; }
.ss-kopf { display: flex; align-items: center; justify-content: space-between;
           gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.ss-kopf h1 { font-size: 1.6rem; margin: 0; }
.ss-kopf .btn { padding: 10px 16px; border-radius: var(--radius-klein);
                text-decoration: none; font-weight: 700;
                background: var(--creme-dunkel); color: var(--gruen-dunkel); }

.ss-box { background: white; border-radius: var(--radius);
          padding: 18px 20px; box-shadow: var(--schatten); margin-bottom: 14px; }

.formgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.formgrid .voll { grid-column: 1 / -1; }
.formgrid label { display: block; font-size: 0.85rem; font-weight: 700;
                  color: var(--text-mitte); margin-bottom: 4px; }
.formgrid input, .formgrid select, .formgrid textarea {
    width: 100%; padding: 12px 14px; font-size: 1rem;
    border: 1px solid var(--creme-dunkel); border-radius: var(--radius-klein);
    background: var(--creme); font-family: 'Nunito', sans-serif;
}
.formgrid textarea { min-height: 72px; resize: vertical; }
.submit-row { margin-top: 14px; text-align: right; }
.submit-row button {
    padding: 14px 28px; background: var(--gold); color: white;
    border: none; border-radius: var(--radius-klein); cursor: pointer;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem;
}
.ss-hinweis { font-size: 0.85rem; color: var(--text-mitte); margin-top: 6px; }
</style>
{% endblock %}

{% block inhalt %}
<div class="ss-wrap">
    <div class="ss-kopf">
        <h1>🤒 Abwesenheit melden</h1>
        <a href="/stempeluhr/menu" class="btn">&#x2190; Zum Menue</a>
    </div>

    <div class="ss-box">
        <form method="post" action="/stempeluhr/abwesenheit">
            <div class="formgrid">
                <div class="voll">
                    <label for="typ">Art der Abwesenheit</label>
                    <select id="typ" name="typ" required>
                        {% for key, label in typen.items() %}
                        <option value="{{ key }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="von">Von</label>
                    <input type="date" id="von" name="von" required value="{{ heute }}">
                </div>
                <div>
                    <label for="bis">Bis</label>
                    <input type="date" id="bis" name="bis" required value="{{ heute }}">
                </div>
                <div class="voll">
                    <label for="bemerkung">Bemerkung (optional)</label>
                    <textarea id="bemerkung" name="bemerkung" maxlength="500"
                              placeholder="z.B. AU-Bescheinigung folgt"></textarea>
                </div>
            </div>
            <div class="submit-row">
                <button type="submit">Abwesenheit eintragen</button>
            </div>
        </form>
        <div class="ss-hinweis">
            Bei Krankheit bitte AU-Bescheinigung bei der Ladenleitung einreichen.
        </div>
    </div>
</div>
{% endblock %}
