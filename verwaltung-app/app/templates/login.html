<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Anmeldung – Verwaltung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@400;600;700;800&display=swap"
      media="print" onload="this.media='all'">
<noscript><link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@400;600;700;800&display=swap"></noscript>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
  background: #1a2332;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.login-wrap {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 28px; padding: 24px;
}
.login-logo {
  font-family: 'Lobster', Georgia, serif;
  font-size: 48px; font-weight: 400;
  color: #b8d4e8; text-align: center; line-height: 1.1;
}
.login-logo span {
  display: block; font-family: 'Nunito', sans-serif;
  font-size: 16px; color: #7a9ab0; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px;
}
.login-card {
  background: white; border-radius: 16px;
  padding: 32px; width: min(400px, 100%);
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}
.login-card h2 {
  font-family: 'Lobster', Georgia, serif;
  font-size: 22px; font-weight: 400; color: #1a2332;
  margin-bottom: 24px; text-align: center;
}
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; margin-bottom: 6px;
  color: #5a7a90; font-size: 12px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
}
.form-control {
  width: 100%; padding: 16px 18px;
  background: #f0f2f5; border: 1px solid #dde2e8;
  border-radius: 10px; color: #1a2332; font-size: 20px;
  font-family: 'Nunito', sans-serif;
}
.form-control:focus { outline: none; border-color: #3a7cbd; }
.btn-login {
  width: 100%; padding: 18px;
  background: #3a7cbd; border: none; border-radius: 10px;
  color: white; font-size: 20px; font-weight: 700;
  font-family: 'Nunito', sans-serif;
  cursor: pointer; margin-top: 6px;
  transition: background 0.12s;
}
.btn-login:hover  { background: #4a9ae0; }
.btn-login:active { opacity: 0.85; transform: scale(0.98); }
.alert-error {
  background: #fde8e8; border: 1px solid #b83030;
  color: #b83030; padding: 12px 16px; border-radius: 8px;
  margin-bottom: 18px; font-size: 15px; text-align: center; font-weight: 700;
}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    ⚙️ Verwaltung
    <span>Habacher Dorfladen</span>
  </div>
  <div class="login-card">
    <h2>Anmeldung</h2>
    {% if fehler %}
    <div class="alert-error">{{ fehler }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <div class="form-group">
        <label>Benutzername</label>
        <input class="form-control" type="text" name="login_name"
               autocomplete="off" autocorrect="off" autocapitalize="off"
               spellcheck="false" autofocus>
      </div>
      <div class="form-group">
        <label>Passwort</label>
        <input class="form-control" type="password" name="passwort">
      </div>
      <button class="btn-login" type="submit">Anmelden</button>
    </form>
  </div>
</div>
</body>
</html>
